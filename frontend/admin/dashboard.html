<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>E-Gov | Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2/dist/tailwind.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="min-h-screen bg-gray-50">

  <nav class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center">
    <div>
      <h1 class="text-lg font-semibold text-blue-700">Barangay E-Gov Portal</h1>
      <p class="text-xs text-gray-400">Admin Analytics Dashboard</p>
    </div>
    <div class="flex items-center gap-4">
      <span id="admin-name" class="text-sm text-gray-600"></span>
      <button id="logout-btn"
        class="text-sm text-gray-500 hover:text-red-600 border border-gray-300 rounded-lg px-3 py-1">
        Log out
      </button>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto px-4 py-8">

    <!-- Stat cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div class="bg-white border border-gray-200 rounded-xl p-5">
        <p class="text-xs text-gray-400 mb-1">Total Requests</p>
        <p class="text-3xl font-semibold text-gray-800" id="stat-total">0</p>
      </div>
      <div class="bg-white border border-gray-200 rounded-xl p-5">
        <p class="text-xs text-gray-400 mb-1">Approved</p>
        <p class="text-3xl font-semibold text-green-600" id="stat-approved">0</p>
      </div>
      <div class="bg-white border border-gray-200 rounded-xl p-5">
        <p class="text-xs text-gray-400 mb-1">Pending</p>
        <p class="text-3xl font-semibold text-yellow-600" id="stat-pending">0</p>
      </div>
      <div class="bg-white border border-gray-200 rounded-xl p-5">
        <p class="text-xs text-gray-400 mb-1">Rejected</p>
        <p class="text-3xl font-semibold text-red-500" id="stat-rejected">0</p>
      </div>
    </div>

    <!-- Charts row -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">

      <!-- Requests by status (doughnut) -->
      <div class="bg-white border border-gray-200 rounded-xl p-6">
        <h2 class="text-sm font-medium text-gray-700 mb-4">Requests by status</h2>
        <div class="relative h-56 flex items-center justify-center">
          <canvas id="statusChart"></canvas>
        </div>
      </div>

      <!-- Requests by document type (bar) -->
      <div class="bg-white border border-gray-200 rounded-xl p-6">
        <h2 class="text-sm font-medium text-gray-700 mb-4">Requests by document type</h2>
        <div class="relative h-56">
          <canvas id="docTypeChart"></canvas>
        </div>
      </div>

    </div>

    <!-- Requests over time (line) -->
    <div class="bg-white border border-gray-200 rounded-xl p-6 mb-8">
      <h2 class="text-sm font-medium text-gray-700 mb-4">Requests over time (last 7 days)</h2>
      <div class="relative h-56">
        <canvas id="timeChart"></canvas>
      </div>
    </div>

    <!-- Recent requests table -->
    <div class="bg-white border border-gray-200 rounded-xl overflow-hidden">
      <div class="px-6 py-4 border-b border-gray-100">
        <h2 class="text-sm font-medium text-gray-700">Recent requests</h2>
      </div>
      <table class="w-full text-sm">
        <thead class="bg-gray-50 border-b border-gray-200">
          <tr>
            <th class="text-left px-5 py-3 text-xs font-medium text-gray-500">Resident</th>
            <th class="text-left px-5 py-3 text-xs font-medium text-gray-500">Document</th>
            <th class="text-left px-5 py-3 text-xs font-medium text-gray-500">Filed</th>
            <th class="text-left px-5 py-3 text-xs font-medium text-gray-500">Status</th>
          </tr>
        </thead>
        <tbody id="recent-tbody">
          <tr><td colspan="4" class="text-center text-gray-400 py-8">Loading...</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://eswmvmrbmcgexizgizmb.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Zb736dLGvnXmzC1QCcr_UA_abncYdsC';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    async function init() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) { window.location.href = '../index.html'; return; }

      const { data: profile } = await supabase
        .schema('public').from('users')
        .select('full_name, role')
        .eq('id', user.id)
        .maybeSingle();

      if (!profile || profile.role !== 'admin') {
        window.location.href = '../index.html';
        return;
      }

      document.getElementById('admin-name').textContent = profile.full_name;
      loadAnalytics();
    }

    async function loadAnalytics() {
      const { data: requests } = await supabase
        .schema('public').from('requests')
        .select('id, status, created_at, document_type_id, resident_id');

      const { data: users } = await supabase
        .schema('public').from('users')
        .select('id, full_name');

      const { data: docTypes } = await supabase
        .schema('public').from('document_types')
        .select('id, name');

      if (!requests) return;

      // ── Stat cards ──────────────────────────────────────────────
      document.getElementById('stat-total').textContent    = requests.length;
      document.getElementById('stat-approved').textContent = requests.filter(r => r.status === 'approved').length;
      document.getElementById('stat-pending').textContent  = requests.filter(r => r.status === 'pending' || r.status === 'under_review').length;
      document.getElementById('stat-rejected').textContent = requests.filter(r => r.status === 'rejected').length;

      // ── Status doughnut chart ───────────────────────────────────
      const statusCounts = {
        Pending:      requests.filter(r => r.status === 'pending').length,
        'Under Review': requests.filter(r => r.status === 'under_review').length,
        Approved:     requests.filter(r => r.status === 'approved').length,
        Rejected:     requests.filter(r => r.status === 'rejected').length,
        Released:     requests.filter(r => r.status === 'released').length,
      };

      new Chart(document.getElementById('statusChart'), {
        type: 'doughnut',
        data: {
          labels: Object.keys(statusCounts),
          datasets: [{
            data: Object.values(statusCounts),
            backgroundColor: ['#fde68a','#bfdbfe','#86efac','#fca5a5','#d1d5db'],
            borderWidth: 0,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: 'right', labels: { font: { size: 11 }, boxWidth: 12 } } }
        }
      });

      // ── Document type bar chart ─────────────────────────────────
      const docTypeCounts = {};
      requests.forEach(r => {
        const name = docTypes?.find(d => d.id === r.document_type_id)?.name || 'Unknown';
        const short = name.replace('Certificate of ', '').replace('Barangay ', '');
        docTypeCounts[short] = (docTypeCounts[short] || 0) + 1;
      });

      new Chart(document.getElementById('docTypeChart'), {
        type: 'bar',
        data: {
          labels: Object.keys(docTypeCounts),
          datasets: [{
            label: 'Requests',
            data: Object.values(docTypeCounts),
            backgroundColor: '#93c5fd',
            borderRadius: 6,
            borderWidth: 0,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 11 } }, grid: { color: '#f3f4f6' } },
            x: { ticks: { font: { size: 10 } }, grid: { display: false } }
          }
        }
      });

      // ── Requests over time line chart ───────────────────────────
      const days = [];
      const dayCounts = {};
      for (let i = 6; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const label = d.toLocaleDateString('en-PH', { month: 'short', day: 'numeric' });
        days.push(label);
        dayCounts[label] = 0;
      }

      requests.forEach(r => {
        const d    = new Date(r.created_at);
        const label = d.toLocaleDateString('en-PH', { month: 'short', day: 'numeric' });
        if (dayCounts[label] !== undefined) dayCounts[label]++;
      });

      new Chart(document.getElementById('timeChart'), {
        type: 'line',
        data: {
          labels: days,
          datasets: [{
            label: 'Requests',
            data: days.map(d => dayCounts[d]),
            borderColor: '#3b82f6',
            backgroundColor: 'rgba(59,130,246,0.08)',
            borderWidth: 2,
            pointRadius: 4,
            pointBackgroundColor: '#3b82f6',
            fill: true,
            tension: 0.4,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 11 } }, grid: { color: '#f3f4f6' } },
            x: { ticks: { font: { size: 11 } }, grid: { display: false } }
          }
        }
      });

      // ── Recent requests table ───────────────────────────────────
      const recent = [...requests]
        .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
        .slice(0, 10);

      const statusColor = {
        pending:      'bg-yellow-100 text-yellow-700',
        under_review: 'bg-blue-100 text-blue-700',
        approved:     'bg-green-100 text-green-700',
        rejected:     'bg-red-100 text-red-700',
        released:     'bg-gray-100 text-gray-600',
      };

      document.getElementById('recent-tbody').innerHTML = recent.map(r => {
        const user    = users?.find(u => u.id === r.resident_id);
        const docType = docTypes?.find(d => d.id === r.document_type_id);
        const date    = new Date(r.created_at).toLocaleDateString('en-PH', { year:'numeric', month:'short', day:'numeric' });
        return `
          <tr class="border-t border-gray-100 hover:bg-gray-50">
            <td class="px-5 py-3 font-medium text-gray-800">${user?.full_name || '—'}</td>
            <td class="px-5 py-3 text-gray-600">${docType?.name || '—'}</td>
            <td class="px-5 py-3 text-gray-400 text-xs">${date}</td>
            <td class="px-5 py-3">
              <span class="text-xs font-medium px-2 py-1 rounded-full ${statusColor[r.status] || 'bg-gray-100 text-gray-600'}">
                ${r.status.replace('_', ' ').toUpperCase()}
              </span>
            </td>
          </tr>`;
      }).join('');
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.href = '../index.html';
    });

    init();
  </script>

</body>
</html>
