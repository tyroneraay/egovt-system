<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>E-Gov | Register</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2/dist/tailwind.min.css" rel="stylesheet"/>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center py-8">

  <div class="bg-white rounded-xl shadow p-8 w-full max-w-md">

    <h1 class="text-2xl font-semibold text-gray-800 mb-1">Create your account</h1>
    <p class="text-sm text-gray-500 mb-6">Barangay E-Government Portal</p>

    <div id="error-msg" class="hidden bg-red-50 text-red-700 text-sm rounded-lg p-3 mb-4"></div>
    <div id="success-msg" class="hidden bg-green-50 text-green-700 text-sm rounded-lg p-3 mb-4"></div>

    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
      <input id="fullname" type="text" placeholder="Juan dela Cruz"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
    </div>

    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input id="email" type="email" placeholder="you@email.com"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
    </div>

    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
      <input id="phone" type="text" placeholder="09xxxxxxxxx"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
    </div>

    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">Home Address</label>
      <input id="address" type="text" placeholder="123 Mabini St., Barangay Holy Spirit"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
    </div>

    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">Valid ID Photo <span class="text-red-500">*</span></label>
      <div id="upload-area" class="border-2 border-dashed border-gray-300 rounded-lg p-4 text-center cursor-pointer hover:border-blue-400 transition">
        <input id="id-photo" type="file" accept="image/*" class="hidden"/>
        <div id="upload-placeholder">
          <p class="text-sm text-gray-400">Click to upload your valid ID</p>
          <p class="text-xs text-gray-300 mt-1">JPEG, PNG — max 5MB</p>
        </div>
        <div id="upload-preview" class="hidden">
          <img id="preview-img" src="" alt="ID Preview" class="max-h-32 mx-auto rounded-lg object-cover"/>
          <p class="text-xs text-green-600 mt-2">ID photo selected</p>
        </div>
      </div>
    </div>

    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input id="password" type="password" placeholder="At least 6 characters"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
    </div>

    <div class="mb-6">
      <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
      <input id="confirm" type="password" placeholder="Repeat your password"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
    </div>

    <button id="register-btn"
      class="w-full bg-blue-600 text-white rounded-lg py-2 text-sm font-medium hover:bg-blue-700 transition">
      Create Account
    </button>

    <p class="text-center text-sm text-gray-500 mt-4">
      Already have an account?
      <a href="index.html" class="text-blue-600 hover:underline">Log in</a>
    </p>

  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://eswmvmrbmcgexizgizmb.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Zb736dLGvnXmzC1QCcr_UA_abncYdsC';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    // ── ID photo upload area ──────────────────────────────────────
    const uploadArea = document.getElementById('upload-area');
    const fileInput  = document.getElementById('id-photo');

    uploadArea.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById('preview-img').src = e.target.result;
        document.getElementById('upload-placeholder').classList.add('hidden');
        document.getElementById('upload-preview').classList.remove('hidden');
      };
      reader.readAsDataURL(file);
    });

    // ── Register ──────────────────────────────────────────────────
    document.getElementById('register-btn').addEventListener('click', async function () {
      const fullname = document.getElementById('fullname').value.trim();
      const email    = document.getElementById('email').value.trim();
      const phone    = document.getElementById('phone').value.trim();
      const address  = document.getElementById('address').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      const idFile   = document.getElementById('id-photo').files[0];
      const errBox   = document.getElementById('error-msg');
      const sucBox   = document.getElementById('success-msg');
      const btn      = this;

      errBox.classList.add('hidden');
      sucBox.classList.add('hidden');

      if (!fullname || !email || !phone || !address || !password) {
        errBox.textContent = 'Please fill in all fields.';
        errBox.classList.remove('hidden');
        return;
      }
      if (!idFile) {
        errBox.textContent = 'Please upload a photo of your valid ID.';
        errBox.classList.remove('hidden');
        return;
      }
      if (password !== confirm) {
        errBox.textContent = 'Passwords do not match.';
        errBox.classList.remove('hidden');
        return;
      }
      if (password.length < 6) {
        errBox.textContent = 'Password must be at least 6 characters.';
        errBox.classList.remove('hidden');
        return;
      }
      if (idFile.size > 5 * 1024 * 1024) {
        errBox.textContent = 'ID photo must be under 5MB.';
        errBox.classList.remove('hidden');
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Creating account...';

      // Step 1: Create auth account
      const { data, error } = await supabase.auth.signUp({ email, password });

      if (error) {
        errBox.textContent = 'Auth Error: ' + error.message;
        errBox.classList.remove('hidden');
        btn.disabled = false; btn.textContent = 'Create Account';
        return;
      }

      if (!data.user) {
        errBox.textContent = 'Registration failed. Try again.';
        errBox.classList.remove('hidden');
        btn.disabled = false; btn.textContent = 'Create Account';
        return;
      }

      // Step 2: Upload ID photo to Supabase Storage
      btn.textContent = 'Uploading ID...';
      const ext      = idFile.name.split('.').pop();
      const fileName = `ids/${data.user.id}.${ext}`;

      const { error: uploadError } = await supabase.storage
        .from('id-photos')
        .upload(fileName, idFile, { contentType: idFile.type, upsert: true });

      if (uploadError) {
        errBox.textContent = 'ID upload failed: ' + uploadError.message;
        errBox.classList.remove('hidden');
        btn.disabled = false; btn.textContent = 'Create Account';
        return;
      }

      const { data: urlData } = supabase.storage.from('id-photos').getPublicUrl(fileName);
      const idPhotoUrl = urlData.publicUrl;

      // Step 3: Save profile to users table — is_verified = FALSE
      const { error: dbError } = await supabase
        .schema('public').from('users').insert({
          id:           data.user.id,
          full_name:    fullname,
          email:        email,
          phone:        phone,
          address:      address,
          role:         'resident',
          is_verified:  false,
          id_photo_url: idPhotoUrl,
        });

      if (dbError) {
        errBox.textContent = 'DB Error: ' + dbError.message;
        errBox.classList.remove('hidden');
        btn.disabled = false; btn.textContent = 'Create Account';
        return;
      }

      sucBox.textContent = 'Account created! Your ID is being reviewed by staff. You will be able to log in once verified.';
      sucBox.classList.remove('hidden');
      btn.textContent = 'Account Created!';
    });
  </script>

</body>
</html>
