<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>E-Gov | Resident Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2/dist/tailwind.min.css" rel="stylesheet"/>
</head>
<body class="min-h-screen bg-gray-50">

  <!-- Navbar -->
  <nav class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center">
    <div>
      <h1 class="text-lg font-semibold text-blue-700">Barangay E-Gov Portal</h1>
      <p class="text-xs text-gray-400">Resident Portal</p>
    </div>

    <div class="flex items-center gap-4">
      <span id="user-name" class="text-sm text-gray-600"></span>
      <a href="profile.html" class="text-sm text-blue-600 hover:underline">My Profile</a>
      <button id="logout-btn"
        class="text-sm text-gray-500 hover:text-red-600 border border-gray-300 rounded-lg px-3 py-1">
        Log out
      </button>
    </div>

    </div>
  </nav>

  <div class="max-w-3xl mx-auto px-4 py-10">

    <!-- My Requests -->
    <div class="mb-10">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-semibold text-gray-800">My Requests</h2>
        <button id="new-request-btn"
          class="bg-blue-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-blue-700 transition">
          + New Request
        </button>
      </div>

      <div id="requests-list">
        <div class="text-sm text-gray-400 text-center py-10 bg-white rounded-xl border border-gray-200">
          No requests yet. Click "New Request" to get started.
        </div>
      </div>
    </div>

  </div>

  <!-- New Request Modal -->
  <div id="modal-overlay"
    style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:50;"
    class="flex items-start justify-center pt-16 px-4">

    <div class="bg-white rounded-xl shadow-lg w-full max-w-lg p-6">

      <div class="flex justify-between items-center mb-5">
        <h3 class="text-lg font-semibold text-gray-800">New Document Request</h3>
        <button id="close-modal" class="text-gray-400 hover:text-gray-600 text-xl font-bold">&times;</button>
      </div>

      <div id="form-error" class="hidden bg-red-50 text-red-700 text-sm rounded-lg p-3 mb-4"></div>
      <div id="form-success" class="hidden bg-green-50 text-green-700 text-sm rounded-lg p-3 mb-4"></div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Document Type</label>
        <select id="doc-type"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">Select a document...</option>
        </select>
        <p id="doc-fee" class="text-xs text-gray-400 mt-1"></p>
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Purpose</label>
        <input id="purpose" type="text" placeholder="e.g. For employment, for school enrollment"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Age</label>
        <input id="age" type="number" placeholder="e.g. 25" min="1" max="120"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
      </div>

      <div class="mb-5">
        <label class="block text-sm font-medium text-gray-700 mb-1">Civil Status</label>
        <select id="civil-status"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">Select civil status...</option>
          <option value="Single">Single</option>
          <option value="Married">Married</option>
          <option value="Widowed">Widowed</option>
          <option value="Separated">Separated</option>
        </select>
      </div>

      <button id="submit-btn"
        class="w-full bg-blue-600 text-white rounded-lg py-2 text-sm font-medium hover:bg-blue-700 transition">
        Submit Request
      </button>

    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://eswmvmrbmcgexizgizmb.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Zb736dLGvnXmzC1QCcr_UA_abncYdsC';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;

    async function init() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) { window.location.href = '../index.html'; return; }
      currentUser = user;

      const { data: profile } = await supabase
        .schema('public').from('users')
        .select('full_name')
        .eq('id', user.id)
        .maybeSingle();

      if (profile) {
        document.getElementById('user-name').textContent = profile.full_name;
      }

      loadDocumentTypes();
      loadMyRequests();
    }

    async function loadDocumentTypes() {
      const { data, error } = await supabase
        .schema('public').from('document_types')
        .select('id, name, description, fee')
        .eq('is_active', true)
        .order('name');

      if (error) { console.error('Doc types error:', error); return; }

      const select = document.getElementById('doc-type');
      data.forEach(doc => {
        const option = document.createElement('option');
        option.value = doc.id;
        option.textContent = doc.name;
        option.dataset.fee = doc.fee;
        option.dataset.desc = doc.description;
        select.appendChild(option);
      });
    }

    document.getElementById('doc-type').addEventListener('change', function () {
      const selected = this.options[this.selectedIndex];
      const feeEl = document.getElementById('doc-fee');
      if (selected.value) {
        const fee = parseFloat(selected.dataset.fee);
        feeEl.textContent = fee === 0 ? 'Fee: Free' : `Fee: ₱${fee.toFixed(2)}`;
      } else {
        feeEl.textContent = '';
      }
    });

    async function loadMyRequests() {
      // Fetch requests including staff_notes
      const { data, error } = await supabase
        .schema('public').from('requests')
        .select('id, status, purpose, staff_notes, created_at, document_type_id')
        .eq('resident_id', currentUser.id)
        .order('created_at', { ascending: false });

      const container = document.getElementById('requests-list');

      if (error || !data || data.length === 0) {
        container.innerHTML = `
          <div class="text-sm text-gray-400 text-center py-10 bg-white rounded-xl border border-gray-200">
            No requests yet. Click "New Request" to get started.
          </div>`;
        return;
      }

      // Fetch document types separately to get names
      const { data: docTypes } = await supabase
        .schema('public').from('document_types')
        .select('id, name');

      container.innerHTML = data.map(req => {
        const docType = docTypes?.find(d => d.id === req.document_type_id);

        const statusColor = {
          pending:      'bg-yellow-100 text-yellow-700',
          under_review: 'bg-blue-100 text-blue-700',
          approved:     'bg-green-100 text-green-700',
          rejected:     'bg-red-100 text-red-700',
          released:     'bg-gray-100 text-gray-600',
        }[req.status] || 'bg-gray-100 text-gray-600';

        const date = new Date(req.created_at).toLocaleDateString('en-PH', {
          year: 'numeric', month: 'short', day: 'numeric'
        });

        return `
          <div class="bg-white border ${req.status === 'rejected' ? 'border-red-200' : 'border-gray-200'} rounded-xl px-5 py-4 mb-3">
            <div class="flex justify-between items-start">
              <div>
                <p class="text-sm font-medium text-gray-800">${docType?.name || 'Unknown'}</p>
                <p class="text-xs text-gray-400 mt-0.5">Purpose: ${req.purpose}</p>
                <p class="text-xs text-gray-400">Filed: ${date}</p>
              </div>
              <span class="text-xs font-medium px-3 py-1 rounded-full ${statusColor} ml-4 flex-shrink-0">
                ${req.status.replace('_', ' ').toUpperCase()}
              </span>
            </div>
            ${req.status === 'rejected' && req.staff_notes ? `
              <div class="mt-3 bg-red-50 border border-red-200 rounded-lg px-4 py-3">
                <p class="text-xs font-medium text-red-600 mb-1">Reason for rejection:</p>
                <p class="text-xs text-red-500">${req.staff_notes}</p>
              </div>` : ''}
            ${req.status === 'approved' ? `
              <div class="mt-3 bg-green-50 border border-green-200 rounded-lg px-4 py-3 flex justify-between items-center">
                <p class="text-xs font-medium text-green-600">Your document is approved and ready.</p>
                <a href="https://eswmvmrbmcgexizgizmb.supabase.co/storage/v1/object/public/issued-documents/documents/${req.id}.pdf"
                  target="_blank"
                  class="text-xs bg-green-600 text-white px-3 py-1.5 rounded-lg hover:bg-green-700">
                  Download PDF
                </a>
              </div>` : ''}
          </div>`;
      }).join('');
    }

    document.getElementById('new-request-btn').addEventListener('click', () => {
      document.getElementById('modal-overlay').style.display = 'flex';
    });

    document.getElementById('close-modal').addEventListener('click', () => {
      document.getElementById('modal-overlay').style.display = 'none';
      resetForm();
    });

    document.getElementById('modal-overlay').addEventListener('click', function (e) {
      if (e.target === this) {
        this.style.display = 'none';
        resetForm();
      }
    });

    function resetForm() {
      document.getElementById('doc-type').value = '';
      document.getElementById('purpose').value = '';
      document.getElementById('age').value = '';
      document.getElementById('civil-status').value = '';
      document.getElementById('doc-fee').textContent = '';
      document.getElementById('form-error').classList.add('hidden');
      document.getElementById('form-success').classList.add('hidden');
      const btn = document.getElementById('submit-btn');
      btn.disabled = false;
      btn.textContent = 'Submit Request';
    }

    document.getElementById('submit-btn').addEventListener('click', async function () {
      const docTypeId   = document.getElementById('doc-type').value;
      const purpose     = document.getElementById('purpose').value.trim();
      const age         = document.getElementById('age').value;
      const civilStatus = document.getElementById('civil-status').value;
      const errBox      = document.getElementById('form-error');
      const sucBox      = document.getElementById('form-success');
      const btn         = this;

      errBox.classList.add('hidden');
      sucBox.classList.add('hidden');

      if (!docTypeId || !purpose || !age || !civilStatus) {
        errBox.textContent = 'Please fill in all fields.';
        errBox.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Submitting...';

      const { error } = await supabase
        .schema('public').from('requests')
        .insert({
          resident_id:      currentUser.id,
          document_type_id: docTypeId,
          purpose:          purpose,
          age:              parseInt(age),
          civil_status:     civilStatus,
          status:           'pending'
        });

      if (error) {
        errBox.textContent = 'Error: ' + error.message;
        errBox.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Submit Request';
        return;
      }

      sucBox.textContent = 'Request submitted successfully!';
      sucBox.classList.remove('hidden');
      btn.textContent = 'Submitted!';

      setTimeout(() => {
        document.getElementById('modal-overlay').style.display = 'none';
        resetForm();
        loadMyRequests();
      }, 1500);
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.href = '../index.html';
    });

    init();
  </script>

</body>
</html>
